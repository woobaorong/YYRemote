name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'website/**'
      - 'capacitor.config.json'
      - 'package.json'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install npm dependencies
        run: |
          npm install
          echo "Installed packages:"
          ls node_modules/@capacitor/ || echo "Capacitor packages not found"
          npx --version
          node -v
          npm -v
      
      - name: Initialize Capacitor Android project
        run: |
          echo "Creating Capacitor Android project..."
          
          # 使用 npm exec 替代 npx，更可靠
          if [ -d "node_modules/.bin" ]; then
            echo "Using local Capacitor CLI"
            ./node_modules/.bin/cap add android
          else
            echo "Falling back to npx"
            npx @capacitor/cli@latest add android
          fi
          
          echo "Android directory created:"
          ls -la android/
      
      - name: Sync web assets to Android
        run: |
          if [ -d "node_modules/.bin" ]; then
            ./node_modules/.bin/cap sync android
          else
            npx @capacitor/cli@latest sync android
          fi
      
      - name: Build Gradle (Debug)
        if: ${{ inputs.build_type != 'release' }}
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      
      - name: Build Gradle (Release)
        if: ${{ inputs.build_type == 'release' }}
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace
      
      - name: Upload APK (Debug)
        if: ${{ inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: YYRemote-Android-Debug-${{ github.run_id }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error
      
      - name: Upload APK (Release)
        if: ${{ inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: YYRemote-Android-Release-${{ github.run_id }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error
